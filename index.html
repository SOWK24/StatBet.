<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StatBet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0A0A0A;
  --surface:   #141414;
  --surface2:  #1E1E1E;
  --border:    #2E2E2E;
  /* Winamax palette — rouge */
  --wina:      #E4173B;
  --wina-dark: #B81130;
  --wina-glow: rgba(228,23,59,.22);
  --wina-bg:   rgba(228,23,59,.09);
  --win:       #00C853;
  --win-bg:    rgba(0,200,83,.09);
  --win-border:rgba(0,200,83,.4);
  --loss:      #FF3B3B;
  --loss-bg:   rgba(255,59,59,.09);
  --loss-border:rgba(255,59,59,.4);
  --text:      #FFFFFF;
  --text2:     #C0C0C0;
  --text3:     #787878;
  --font-d:    'Barlow Condensed', sans-serif;
  --font-b:    'Inter', sans-serif;
}

html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-b); -webkit-font-smoothing:antialiased; }

#app { max-width:480px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; position:relative; }

#tabbar { position:sticky; top:0; z-index:100; display:flex; background:var(--surface); border-bottom:1px solid var(--border); }
.tab-btn {
  flex:1; padding:14px 8px 11px; background:none; border:none; border-bottom:3px solid transparent;
  color:var(--text3); font-family:var(--font-d); font-size:13px; font-weight:700;
  letter-spacing:1.2px; text-transform:uppercase; cursor:pointer;
  transition:color .2s,border-color .2s; display:flex; align-items:center; justify-content:center; gap:7px;
}
.tab-btn.active { color:var(--text); border-bottom-color:var(--wina); }
.tab-btn svg { flex-shrink:0; }

.panel { display:none; flex:1; flex-direction:column; overflow-y:auto; }
.panel.active { display:flex; }
.panel-inner { padding:20px 16px 100px; }

.app-logo { font-family:var(--font-d); font-size:36px; font-weight:800; letter-spacing:3px; margin-bottom:24px; padding-top:4px; line-height:1; }
.app-logo span { color:var(--wina); }

.section-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text2); margin-bottom:10px; }

.scoreboard { background:var(--surface); border-radius:10px; padding:20px 18px 16px; margin-bottom:12px; position:relative; overflow:hidden; }
.scoreboard::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--wina); transform-origin:left; }
.scoreboard.updating::before { animation:scan .5s ease; }
@keyframes scan { 0%{transform:scaleX(0)}60%{transform:scaleX(1)}100%{transform:scaleX(1)} }
.scoreboard-label { font-size:10px; font-weight:600; letter-spacing:1.4px; text-transform:uppercase; color:var(--text2); margin-bottom:4px; }
.scoreboard-value { font-family:var(--font-d); font-size:52px; font-weight:800; line-height:1; letter-spacing:-1px; transition:color .3s; }
.scoreboard-value.pos { color:var(--win); }
.scoreboard-value.neg { color:var(--loss); }
.scoreboard-value.neu { color:var(--text); }
.scoreboard-sub { font-size:12px; color:var(--text2); margin-top:5px; font-weight:500; }

.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.stats-row.triple { grid-template-columns:1fr 1fr 1fr; }
.stat-card { background:var(--surface); border-radius:8px; padding:12px 12px 10px; border-top:2px solid var(--border); }
.stat-card.win-card  { border-top-color:var(--win); }
.stat-card.loss-card { border-top-color:var(--loss); }
.stat-label { font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--text2); margin-bottom:4px; }
.stat-value { font-family:var(--font-d); font-size:20px; font-weight:700; color:var(--text); line-height:1.1; }
.stat-value.win  { color:var(--win); }
.stat-value.loss { color:var(--loss); }
.stat-sub { font-size:10px; color:var(--text3); margin-top:2px; }

/* ── Form ── */
.form-card { background:var(--surface); border-radius:12px; padding:18px; }
.form-row { margin-bottom:14px; }
.form-row:last-of-type { margin-bottom:0; }
.form-label { display:block; font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text2); margin-bottom:7px; }
.form-input {
  width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  padding:13px 14px; color:var(--text); font-family:var(--font-d); font-size:22px; font-weight:600;
  outline:none; transition:border-color .2s,box-shadow .2s; appearance:none; -moz-appearance:textfield;
}
.form-input::-webkit-inner-spin-button, .form-input::-webkit-outer-spin-button { -webkit-appearance:none; }
.form-input::placeholder { color:var(--text3); }
.form-input:focus { border-color:var(--wina); box-shadow:0 0 0 3px var(--wina-glow); }

/* ── Résultat buttons ── */
.result-toggle { display:flex; gap:8px; margin-bottom:14px; }
.result-btn {
  flex:1; padding:14px 10px; border-radius:9px; border:2px solid var(--border);
  background:var(--surface2); color:var(--text3); font-family:var(--font-d);
  font-size:16px; font-weight:700; letter-spacing:.8px; cursor:pointer;
  transition:all .18s; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:7px;
}
.result-btn:active { transform:scale(.97); }
.result-btn.selected-win  { background:var(--win-bg); border-color:var(--win);  color:var(--win); }
.result-btn.selected-loss { background:var(--loss-bg); border-color:var(--loss); color:var(--loss); }

.preview-bar { display:flex; align-items:center; gap:8px; background:var(--surface2); border-radius:8px; padding:11px 14px; margin:14px 0; opacity:0; transition:opacity .2s; }
.preview-bar.visible { opacity:1; }
.preview-item { font-size:13px; color:var(--text2); font-weight:500; }
.preview-item strong { color:var(--text); font-weight:700; }
.preview-item.bilan strong.pos { color:var(--win); }
.preview-item.bilan strong.neg { color:var(--loss); }
.preview-sep { color:var(--text3); font-size:12px; flex:1; text-align:center; }

.btn-submit {
  width:100%; background:var(--wina); border:none; border-radius:9px; padding:15px;
  color:#fff; font-family:var(--font-d); font-size:17px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; transition:background .15s,transform .1s,box-shadow .2s;
  box-shadow:0 4px 20px var(--wina-glow); margin-top:16px;
}
.btn-submit:hover  { background:var(--wina-dark); }
.btn-submit:active { transform:scale(.98); }
.btn-submit:disabled { opacity:.35; cursor:not-allowed; transform:none; }

/* ── Toast ── */
#toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:40px; padding:10px 22px; font-size:14px; font-weight:600;
  opacity:0; transition:opacity .25s,transform .25s; pointer-events:none;
  white-space:nowrap; z-index:200; max-width:90vw;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.win  { border-color:var(--win-border); color:var(--win); }
#toast.loss { border-color:var(--loss-border); color:var(--loss); }

.divider { height:1px; background:var(--border); margin:24px 0; }

/* ── Record card (plus gros gain) ── */
.record-card {
  background:var(--surface); border-radius:12px; overflow:hidden;
  border:1px solid var(--border); position:relative;
}
.record-photo-wrap {
  position:relative; width:100%; aspect-ratio:16/10; background:var(--surface2);
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.record-photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.record-photo-empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  color:var(--text3); padding:24px; text-align:center;
}
.record-photo-empty svg { opacity:.5; }
.record-photo-empty span { font-size:12px; font-weight:500; }
.record-trophy {
  position:absolute; top:10px; left:10px; background:rgba(0,0,0,.55); backdrop-filter:blur(4px);
  border-radius:7px; padding:5px 10px; font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:#FFD43B; display:flex; align-items:center; gap:5px;
}
.record-photo-btn {
  position:absolute; bottom:10px; right:10px; background:rgba(10,10,10,.75); backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.15); border-radius:8px; padding:7px 12px;
  color:#fff; font-size:11px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;
  transition:background .15s;
}
.record-photo-btn:hover { background:rgba(228,23,59,.85); }
.record-info { padding:14px 16px 16px; }
.record-bilan { font-family:var(--font-d); font-size:30px; font-weight:800; color:var(--win); line-height:1; margin-bottom:6px; }
.record-meta { display:flex; flex-wrap:wrap; gap:10px 16px; font-size:12px; color:var(--text2); }
.record-meta strong { color:var(--text); font-weight:600; }
.record-empty-state { padding:28px 16px; text-align:center; color:var(--text2); font-size:13px; }
.record-edit-btn {
  position:absolute; top:10px; right:10px; background:rgba(10,10,10,.55); backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.15); border-radius:7px; width:28px; height:28px;
  display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer; transition:background .15s;
}
.record-edit-btn:hover { background:rgba(228,23,59,.85); }
.record-edit-form { display:flex; flex-direction:column; gap:10px; }
.record-edit-row { display:flex; flex-direction:column; gap:4px; }
.record-edit-row label { font-size:11px; color:var(--text2); font-weight:600; }
.record-edit-row input {
  background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 10px;
  color:var(--text); font-size:14px; font-family:inherit;
}
.record-edit-row input:focus { outline:none; border-color:var(--win); }
.record-edit-actions { display:flex; gap:8px; margin-top:2px; }
.record-edit-actions button {
  flex:1; border:none; border-radius:8px; padding:9px; font-size:12px; font-weight:700; cursor:pointer;
  font-family:inherit;
}
.record-edit-save { background:var(--win); color:#06140c; }
.record-edit-cancel { background:var(--surface2); color:var(--text); border:1px solid var(--border) !important; }
.record-edit-reset { background:transparent; color:var(--text2); text-decoration:underline; font-size:11px; font-weight:500; border:none; cursor:pointer; align-self:center; margin-top:2px; }

/* ── History ── */
.history-title { font-family:var(--font-d); font-size:32px; font-weight:800; letter-spacing:2px; margin-bottom:20px; padding-top:4px; }

.year-block { background:var(--surface); border-radius:12px; margin-bottom:12px; overflow:hidden; }
.year-header {
  width:100%; background:none; border:none; color:var(--text);
  padding:16px 16px 14px; display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; text-align:left;
}
.year-header-left { flex:1; }
.year-num { font-family:var(--font-d); font-size:28px; font-weight:800; line-height:1; letter-spacing:1px; }
.year-sub { font-size:12px; color:var(--text2); margin-top:3px; font-weight:500; }
.year-chevron { color:var(--wina); font-size:11px; margin-left:12px; transition:transform .25s; }
.year-header.open .year-chevron { transform:rotate(180deg); }
.year-body { display:none; padding:0 12px 14px; }
.year-body.open { display:block; }

.year-pills { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:14px; }
.pill { background:var(--surface2); border-radius:7px; padding:9px 8px 8px; text-align:center; }
.pill-label { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text2); display:block; margin-bottom:3px; }
.pill-value { font-family:var(--font-d); font-size:15px; font-weight:700; color:var(--text); }
.pill-value.pos { color:var(--win); }
.pill-value.neg { color:var(--loss); }

.chart-wrap { background:var(--surface2); border-radius:8px; padding:12px 8px 8px; margin-bottom:14px; position:relative; }
.chart-title { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text2); margin-bottom:10px; padding:0 4px; }
canvas { display:block; width:100%; cursor:pointer; }

.chart-tooltip {
  position:absolute; transform:translateX(-50%);
  background:#0A0A0A; border:1px solid var(--border); border-radius:8px;
  padding:9px 11px; min-width:130px; pointer-events:none;
  opacity:0; transition:opacity .12s; z-index:20;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}
.chart-tooltip.show { opacity:1; }
.ctt-month { font-family:var(--font-d); font-size:13px; font-weight:700; letter-spacing:.5px; margin-bottom:6px; text-transform:capitalize; }
.ctt-row { display:flex; justify-content:space-between; gap:14px; font-size:11px; color:var(--text2); margin-bottom:2px; }
.ctt-row strong { color:var(--text); font-weight:600; }
.ctt-row.ctt-bilan { margin-top:4px; padding-top:4px; border-top:1px solid var(--border); }
.ctt-row.ctt-bilan strong.pos { color:var(--win); }
.ctt-row.ctt-bilan strong.neg { color:var(--loss); }

.bet-list { display:flex; flex-direction:column; gap:6px; }
.bet-row { display:flex; align-items:center; padding:11px 12px; border-radius:8px; border-left:3px solid; gap:10px; }
.bet-row.win  { background:var(--win-bg);  border-color:var(--win-border); }
.bet-row.loss { background:var(--loss-bg); border-color:var(--loss-border); }

.bet-badge { font-size:9px; font-weight:700; letter-spacing:.6px; padding:3px 7px; border-radius:5px; flex-shrink:0; }
.win  .bet-badge { color:var(--win);  background:rgba(0,200,83,.18); }
.loss .bet-badge { color:var(--loss); background:rgba(255,59,59,.18); }

.bet-info { flex:1; min-width:0; }
.bet-date { font-size:11px; color:var(--text2); margin-bottom:2px; }
.bet-amounts { font-size:12px; color:var(--text2); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bet-amounts strong { color:var(--text); font-weight:600; }

.bet-bilan { font-family:var(--font-d); font-size:17px; font-weight:700; flex-shrink:0; }
.win  .bet-bilan { color:var(--win); }
.loss .bet-bilan { color:var(--loss); }

.bet-delete {
  flex-shrink:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:7px; border:none; background:transparent; color:var(--text3);
  cursor:pointer; transition:background .15s,color .15s; -webkit-tap-highlight-color:transparent;
}
.bet-delete:hover, .bet-delete:active { background:rgba(255,59,59,.15); color:var(--loss); }

.bet-edit {
  flex-shrink:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:7px; border:none; background:transparent; color:var(--text3);
  cursor:pointer; transition:background .15s,color .15s; -webkit-tap-highlight-color:transparent;
}
.bet-edit:hover, .bet-edit:active { background:var(--wina-bg); color:var(--wina); }

/* ── Delete modal ── */
#del-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; align-items:flex-end; justify-content:center; }
#del-overlay.show { display:flex; }
#del-sheet { background:var(--surface); border-radius:18px 18px 0 0; padding:24px 20px 36px; width:100%; max-width:480px; animation:slideUp .22s cubic-bezier(.22,1,.36,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
#del-sheet h3 { font-family:var(--font-d); font-size:20px; font-weight:800; letter-spacing:.5px; margin-bottom:6px; }
#del-sheet p  { font-size:13px; color:var(--text2); margin-bottom:20px; line-height:1.5; }
.del-actions { display:flex; gap:10px; }
.del-actions button { flex:1; padding:14px; border-radius:9px; border:none; font-family:var(--font-d); font-size:16px; font-weight:700; letter-spacing:.5px; cursor:pointer; transition:opacity .15s,transform .1s; }
.del-actions button:active { transform:scale(.97); }
#del-cancel  { background:var(--surface2); color:var(--text2); }
#del-confirm { background:var(--loss);     color:#fff; box-shadow:0 4px 16px rgba(255,59,59,.3); }

/* ── Edit modal (réutilise le style du sheet) ── */
#edit-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; align-items:flex-end; justify-content:center; }
#edit-overlay.show { display:flex; }
#edit-sheet { background:var(--surface); border-radius:18px 18px 0 0; padding:24px 20px 36px; width:100%; max-width:480px; animation:slideUp .22s cubic-bezier(.22,1,.36,1); }
#edit-sheet h3 { font-family:var(--font-d); font-size:20px; font-weight:800; letter-spacing:.5px; margin-bottom:16px; }
#edit-cancel  { background:var(--surface2); color:var(--text2); }
#edit-confirm { background:var(--wina); color:#fff; box-shadow:0 4px 16px var(--wina-glow); }

.empty-state { text-align:center; padding:60px 20px; }
.empty-state p:first-child { font-family:var(--font-d); font-size:22px; font-weight:700; margin-bottom:8px; }
.empty-state p { font-size:14px; color:var(--text2); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

@media(min-width:481px){ #app{ border-left:1px solid var(--border); border-right:1px solid var(--border); } }
</style>
</head>
<body>
<div id="app">

  <nav id="tabbar">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="2" y="3" width="7" height="9" rx="1"/><rect x="15" y="3" width="7" height="5" rx="1"/><rect x="15" y="12" width="7" height="9" rx="1"/><rect x="2" y="16" width="7" height="5" rx="1"/></svg>
      Mon Activité
    </button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Historique
    </button>
  </nav>

  <div id="panel-dashboard" class="panel active">
    <div class="panel-inner">
      <div class="app-logo">STAT<span>BET</span></div>

      <div class="section-label">Bilan global</div>
      <div class="scoreboard" id="scoreboard-global">
        <div class="scoreboard-label">Bilan net</div>
        <div class="scoreboard-value" id="sb-bilan">—</div>
        <div class="scoreboard-sub" id="sb-sub">—</div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Mises</div>
          <div class="stat-value" id="g-mises">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Gains</div>
          <div class="stat-value" id="g-gains">—</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-label">Plus gros gain</div>
      <div class="record-card" id="record-card">
        <!-- injecté par JS -->
      </div>

      <div class="divider"></div>

      <div class="section-label">Nouveau pari</div>
      <div class="form-card">
        <div class="form-row">
          <label class="form-label" for="input-mise">Mise (€)</label>
          <input class="form-input" id="input-mise" type="number" min="0" step="0.01" placeholder="15.00" inputmode="decimal">
        </div>

        <div class="form-row">
          <label class="form-label">Résultat</label>
          <div class="result-toggle">
            <button class="result-btn" id="btn-win" onclick="selectResult('win')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              Gagnant
            </button>
            <button class="result-btn" id="btn-loss" onclick="selectResult('loss')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Perdant
            </button>
          </div>
        </div>

        <div id="gain-row" class="form-row" style="display:none">
          <label class="form-label" for="input-gain">Gain total reçu (€)</label>
          <input class="form-input" id="input-gain" type="number" min="0" step="0.01" placeholder="38.50" inputmode="decimal">
        </div>

        <div class="preview-bar" id="preview-bar">
          <span class="preview-item">Mise&nbsp;: <strong id="prev-mise">—</strong></span>
          <span class="preview-sep">→</span>
          <span class="preview-item bilan">Bilan&nbsp;: <strong id="prev-bilan">—</strong></span>
        </div>

        <button class="btn-submit" id="btn-add" disabled onclick="addBet()">
          + Enregistrer le pari
        </button>
      </div>
    </div>
  </div>

  <div id="panel-history" class="panel">
    <div class="panel-inner">

  return `${sign}${abs} €`;

/* ─── Calculs ──────────────────────────────────────────────────────── */
function calcStats(bets) {
  const totalMises = r2(bets.reduce((s,b) => s + b.mise, 0));
  const totalGains = r2(bets.reduce((s,b) => s + b.gain, 0));
  const bilanNet   = r2(totalGains - totalMises);
  const roi        = totalMises > 0 ? r2(bilanNet / totalMises * 100) : 0;
  const nbGains    = bets.filter(b => b.gain > b.mise).length;
  const tauxReussite = bets.length > 0 ? r2(nbGains / bets.length * 100) : 0;
  return { totalMises, totalGains, bilanNet, roi, nbParis: bets.length, nbGains, tauxReussite };
}

function groupByYear(bets) {
  const map = {};
  for (const b of bets) {
    if (!map[b.year]) map[b.year] = [];
    map[b.year].push(b);
  }
  return Object.keys(map).map(Number).sort((a,b) => b-a).map(year => ({
    year,
    bets: map[year].sort((a,b) => new Date(b.date) - new Date(a.date)),
    stats: calcStats(map[year])
  }));
}

function chartData(data) {
  if (data.length < 1) return null;
  const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));
  const byMonth = {};
  const order = [];
  for (const b of sorted) {
    const d = new Date(b.date);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!byMonth[k]) {
      byMonth[k] = { mises:0, gains:0, nb:0, label: d.toLocaleDateString('fr-FR', { month:'short' }).replace('.','') };
      order.push(k);
    }
    byMonth[k].mises += b.mise;
    byMonth[k].gains += b.gain;
    byMonth[k].nb += 1;
  }
  return order.map(k => {
    const m = byMonth[k];
    const bilan = r2(m.gains - m.mises);
    return { key:k, label:m.label, mises:r2(m.mises), gains:r2(m.gains), bilan, nb:m.nb };
  });
}

function loadBets() {
  try {
    if (!localStorage.getItem(SEEDED_KEY)) {
      const seed = generateSeedBets();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(seed));
      localStorage.setItem(SEEDED_KEY, '1');
      return seed;
    }
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch(e) { return []; }
}

function getBiggestWin() {
  let best = null;
  for (const b of bets) {
    const bilan = r2(b.gain - b.mise);
    if (bilan > 0 && (!best || bilan > r2(best.gain - best.mise))) best = b;
  }
  return best;
}

function getRecordOverride() {
  try {
    const raw = localStorage.getItem(RECORD_OVERRIDE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function setRecordOverride(obj) {
  try { localStorage.setItem(RECORD_OVERRIDE_KEY, JSON.stringify(obj)); } catch(e) {}
}

function clearRecordOverride() {
  try { localStorage.removeItem(RECORD_OVERRIDE_KEY); } catch(e) {}
}

   priorité à la surcharge manuelle si elle existe, sinon au pari gagnant le plus élevé. */
function getRecordDisplayData() {
  const override = getRecordOverride();
  if (override) {
    return { id: 'manual', mise: override.mise, gain: override.gain, date: override.date, manual: true };
  }
  const best = getBiggestWin();
  if (!best) return null;
  return { id: best.id, mise: best.mise, gain: best.gain, date: best.date, manual: false };
}

    const obj = JSON.parse(raw);

  const card = document.getElementById('record-card');
  const data = getRecordDisplayData() || { mise: '', gain: '', date: new Date().toISOString().slice(0,10) };
  const dateVal = data.date ? new Date(data.date).toISOString().slice(0,10) : new Date().toISOString().slice(0,10);

  card.innerHTML = `
    <div class="record-info">
      <div class="record-edit-form">
        <div class="record-edit-row">
          <label>Mise (€)</label>
          <input type="number" step="0.01" id="record-edit-mise" value="${data.mise ?? ''}">
        </div>
        <div class="record-edit-row">
          <label>Gain total (€)</label>
          <input type="number" step="0.01" id="record-edit-gain" value="${data.gain ?? ''}">
        </div>
        <div class="record-edit-row">
          <label>Date</label>
          <input type="date" id="record-edit-date" value="${dateVal}">
        </div>
        <div class="record-edit-actions">
          <button class="record-edit-cancel" onclick="renderRecordCard()">Annuler</button>
          <button class="record-edit-save" onclick="saveRecordEdit()">Enregistrer</button>
        </div>
        ${getRecordOverride() ? `<button class="record-edit-reset" onclick="resetRecordEdit()">Revenir au calcul automatique</button>` : ''}
      </div>
    </div>
  `;
}

function saveRecordEdit() {
  const mise = parseFloat(document.getElementById('record-edit-mise').value);
  const gain = parseFloat(document.getElementById('record-edit-gain').value);
  const date = document.getElementById('record-edit-date').value;
  if (isNaN(mise) || isNaN(gain) || !date) {
    showToast('Merci de remplir tous les champs', 'loss');
    return;
  }
  setRecordOverride({ mise, gain, date });
  renderRecordCard();
  showToast('Record mis à jour 🏆', 'win');
}

function resetRecordEdit() {
  clearRecordOverride();
  renderRecordCard();
  showToast('Retour au calcul automatique', 'win');
}

function triggerRecordPhotoUpload() {
  const data = getRecordDisplayData();
  if (!data) return;
  document.getElementById('record-photo-input').click();
}

document.getElementById('record-photo-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const data = getRecordDisplayData();
  if (!data) return;
  const reader = new FileReader();
  reader.onload = () => {
    setRecordPhoto(data.id, reader.result);
    renderRecordCard();
    showToast('Capture ajoutée 📸', 'win');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

/* ─── Formulaire ────────────────────────────────────────────────────── */
const inputMise  = document.getElementById('input-mise');
const inputGain  = document.getElementById('input-gain');
const btnAdd     = document.getElementById('btn-add');
const previewBar = document.getElementById('preview-bar');
const gainRow    = document.getElementById('gain-row');

let selectedResult = null;

function selectResult(type) {
  selectedResult = type;
  document.getElementById('btn-win').className  = 'result-btn' + (type==='win'  ? ' selected-win'  : '');
  document.getElementById('btn-loss').className = 'result-btn' + (type==='loss' ? ' selected-loss' : '');
  gainRow.style.display = type === 'win' ? '' : 'none';
  if (type === 'loss') { inputGain.value = ''; }
  updatePreview();
}

function updatePreview() {
  const mise = parseFloat(inputMise.value) || 0;
  const hasData = mise > 0 && selectedResult !== null;
  previewBar.classList.toggle('visible', hasData);
  btnAdd.disabled = !hasData;
  if (!hasData) return;

  let gain = 0;
  if (selectedResult === 'win') gain = parseFloat(inputGain.value) || 0;

  const bilan = r2(gain - mise);
  document.getElementById('prev-mise').textContent = fmtEurPlain(mise);
  const pb = document.getElementById('prev-bilan');
  pb.textContent = fmtEur(bilan, true);
  pb.className = bilan >= 0 ? 'pos' : 'neg';
}

inputMise.addEventListener('input', updatePreview);
inputGain.addEventListener('input', updatePreview);

function addBet() {
  const mise = parseFloat(inputMise.value);
  if (!(mise > 0) || selectedResult === null) return;
  const gain = selectedResult === 'loss' ? 0 : (parseFloat(inputGain.value) || 0);
  const now  = new Date();
  const newBet = {
    id: `bet-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
    mise: r2(mise), gain: r2(gain),
    date: now.toISOString(),
    year: now.getFullYear()
  };
  bets.unshift(newBet);
  saveBets(bets);
  inputMise.value = '';
  inputGain.value = '';
  selectedResult = null;
  document.getElementById('btn-win').className  = 'result-btn';
  document.getElementById('btn-loss').className = 'result-btn';
  gainRow.style.display = 'none';
  updatePreview();
  renderDashboard();
  const isWin = gain > mise;
  showToast(isWin ? `✓ +${fmtEurPlain(gain - mise)} enregistré !` : `✗ Perte de ${fmtEurPlain(mise)} enregistrée`, isWin ? 'win' : 'loss');
}

/* ─── Toast ─────────────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg, cls) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${cls}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 2600);
}

/* ─── Canvas chart : bilan mensuel en barres, avec tooltip ──────────── */
const chartTooltips = new WeakMap(); // canvas -> { bars: [...], el: tooltipDiv }

function drawChart(canvas, data) {
  const cd = chartData(data);
  const wrap = canvas.parentElement;
  // Reset any previous tooltip dom for this canvas
  const prevTip = wrap.querySelector('.chart-tooltip');
  if (prevTip) prevTip.remove();

  if (!cd || cd.length < 1) {
    canvas.height = 40;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#787878';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Pas encore assez de données', (wrap.clientWidth - 16) / 2, 24);
    return;
  }

  const dpr = window.devicePixelRatio || 1;
  const W   = wrap.clientWidth - 16;
  const H   = 170;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD = { top:14, right:10, bottom:26, left:48 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  const bilans = cd.map(m => m.bilan);
  const min = Math.min(...bilans, 0);
  const max = Math.max(...bilans, 0);
  const range = (max - min) || 1;
  // marge haut/bas pour ne pas coller les barres aux bords
  const padRatio = 0.12;
  const yMin = min - range * padRatio;
  const yMax = max + range * padRatio;
  const yRange = (yMax - yMin) || 1;

  const toY = v => PAD.top + cH - ((v - yMin) / yRange) * cH;
  const y0  = toY(0);

  const n = cd.length;
  const slot = cW / n;
  const barW = Math.min(28, slot * 0.55);

  // grille horizontale légère
  ctx.strokeStyle = '#242424';
  ctx.lineWidth = 1;
  const gridSteps = 4;
  for (let i = 0; i <= gridSteps; i++) {
    const y = PAD.top + (cH / gridSteps) * i;
    ctx.beginPath();
    ctx.moveTo(PAD.left, y);
    ctx.lineTo(PAD.left + cW, y);
    ctx.stroke();
  }
  // labels axe Y
  ctx.fillStyle = '#787878';
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= gridSteps; i++) {
    const v = yMax - (yRange / gridSteps) * i;
    const y = PAD.top + (cH / gridSteps) * i;
    ctx.fillText((v >= 0 ? '+' : '−') + Math.round(Math.abs(v)), PAD.left - 6, y + 3);
  }

  // ligne du zéro, plus marquée
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(PAD.left, y0);
  ctx.lineTo(PAD.left + cW, y0);
  ctx.stroke();

  const bars = [];
  cd.forEach((m, i) => {
    const cx = PAD.left + slot * i + slot / 2;
    const yVal = toY(m.bilan);
    const top = Math.min(yVal, y0);
    const h = Math.max(Math.abs(yVal - y0), 1.5);
    const isPos = m.bilan >= 0;
    const color = isPos ? '#00C853' : '#FF3B3B';

    ctx.fillStyle = color;
    const x = cx - barW / 2;
    const r = Math.min(4, barW / 2, h);
    ctx.beginPath();
    if (isPos) {
      // coins arrondis en haut
      ctx.moveTo(x, top + r);
      ctx.arcTo(x, top, x + r, top, r);
      ctx.arcTo(x + barW, top, x + barW, top + r, r);
      ctx.lineTo(x + barW, top + h);
      ctx.lineTo(x, top + h);
      ctx.closePath();
    } else {
      // coins arrondis en bas
      ctx.moveTo(x, top);
      ctx.lineTo(x + barW, top);
      ctx.lineTo(x + barW, top + h - r);
      ctx.arcTo(x + barW, top + h, x + barW - r, top + h, r);
      ctx.arcTo(x, top + h, x, top + h - r, r);
      ctx.closePath();
    }
    ctx.fill();

    // label mois
    ctx.fillStyle = '#787878';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(m.label, cx, H - 8);

    bars.push({ x: PAD.left + slot * i, w: slot, cx, m });
  });

  // ─ Tooltip interactif ─
  const tip = document.createElement('div');
  tip.className = 'chart-tooltip';
  wrap.style.position = 'relative';
  wrap.appendChild(tip);

  function showTip(bar, clientX) {
    const m = bar.m;
    const bilanTxt = fmtEur(m.bilan, true);
    tip.innerHTML = `
      <div class="ctt-month">${m.label.charAt(0).toUpperCase()+m.label.slice(1)}</div>
      <div class="ctt-row"><span>Paris</span><strong>${m.nb}</strong></div>
      <div class="ctt-row"><span>Mises</span><strong>${fmtEurPlain(m.mises)}</strong></div>
      <div class="ctt-row"><span>Gains</span><strong>${fmtEurPlain(m.gains)}</strong></div>
      <div class="ctt-row ctt-bilan"><span>Bilan</span><strong class="${m.bilan>=0?'pos':'neg'}">${bilanTxt}</strong></div>
    `;
    tip.classList.add('show');
    const rect = wrap.getBoundingClientRect();
    let left = bar.cx - rect.left;
    const tipW = 150;
    left = Math.max(tipW/2 + 4, Math.min(rect.width - tipW/2 - 4, left));
    tip.style.left = left + 'px';
    tip.style.top = '4px';
  }
  function hideTip() { tip.classList.remove('show'); }

  function findBar(clientX) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    return bars.find(b => x >= b.x && x <= b.x + b.w);
  }

  canvas.onclick = (e) => {
    const bar = findBar(e.clientX);
    if (bar) {
      if (tip.dataset.active === bar.m.key) { hideTip(); tip.dataset.active=''; }
      else { showTip(bar, e.clientX); tip.dataset.active = bar.m.key; }
    } else hideTip();
  };
  canvas.onmousemove = (e) => {
    const bar = findBar(e.clientX);
    if (bar) { showTip(bar, e.clientX); tip.dataset.active = bar.m.key; }
  };
  canvas.onmouseleave = () => { hideTip(); tip.dataset.active=''; };
  canvas.ontouchstart = (e) => {
    const touch = e.touches[0];
    const bar = findBar(touch.clientX);
    if (bar) { showTip(bar, touch.clientX); tip.dataset.active = bar.m.key; }
  };
}

/* ─── History ───────────────────────────────────────────────────────── */
function renderHistory() {
  const container = document.getElementById('history-container');
  const groups = groupByYear(bets);
  if (groups.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>Aucun pari</p><p>Saisis ton premier pari dans Mon Activité.</p></div>`;
    return;
  }
  container.innerHTML = '';
  groups.forEach(({ year, bets: yBets, stats }) => {
    const isCurrentYear = year === new Date().getFullYear();
    const bilanCls = stats.bilanNet > 0 ? 'pos' : stats.bilanNet < 0 ? 'neg' : '';
    const block = document.createElement('div');
    block.className = 'year-block';
    block.innerHTML = `
      <button class="year-header${isCurrentYear ? ' open' : ''}" onclick="toggleYear(this)">
        <div class="year-header-left">
          <div class="year-num">${year}</div>
          <div class="year-sub">${stats.nbParis} paris · ${stats.tauxReussite.toFixed(0)}% de réussite</div>
        </div>
        <span class="year-chevron">▼</span>
      </button>
      <div class="year-body${isCurrentYear ? ' open' : ''}">
        <div class="year-pills">
          <div class="pill">
            <span class="pill-label">Mises</span>
            <span class="pill-value">${fmtEurPlain(stats.totalMises)}</span>
          </div>
          <div class="pill">
            <span class="pill-label">Gains</span>
            <span class="pill-value">${fmtEurPlain(stats.totalGains)}</span>
          </div>
          <div class="pill">
            <span class="pill-label">Bilan</span>
            <span class="pill-value ${bilanCls}">${fmtEur(stats.bilanNet, true)}</span>
          </div>
        </div>
        <div class="chart-wrap">
          <div class="chart-title">Bilan par mois — touche une barre pour le détail</div>
          <canvas data-year="${year}"></canvas>
        </div>
        <div class="bet-list">
          ${yBets.map(b => {
            const isWin = b.gain > b.mise;
            const bilan = r2(b.gain - b.mise);
            return `<div class="bet-row ${isWin ? 'win' : 'loss'}" id="bet-row-${b.id}">
              <span class="bet-badge">${isWin ? 'GAIN' : 'PERTE'}</span>
              <div class="bet-info">
                <div class="bet-date">${fmtDate(b.date)}</div>
                <div class="bet-amounts">Mise : <strong>${fmtEurPlain(b.mise)}</strong>
                  ${isWin ? `→ Gain : <strong>${fmtEurPlain(b.gain)}</strong>` : '→ <strong>Perdu</strong>'}
                </div>
              </div>
              <span class="bet-bilan">${fmtEur(bilan, true)}</span>
              <button class="bet-edit" onclick="openEditModal('${b.id}')" title="Modifier ce pari">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
              </button>
              <button class="bet-delete" onclick="openDeleteModal('${b.id}')" title="Supprimer ce pari">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
    container.appendChild(block);
    requestAnimationFrame(() => {
      const canvas = block.querySelector(`canvas[data-year="${year}"]`);
      if (canvas) drawChart(canvas, yBets);
    });
  });
}

function toggleYear(btn) {
  btn.classList.toggle('open');
  const body = btn.nextElementSibling;
  body.classList.toggle('open');
  if (body.classList.contains('open')) {
    const canvas = body.querySelector('canvas');
    if (canvas && !canvas.dataset.drawn) {
      const year = canvas.dataset.year;
      const yBets = bets.filter(b => b.year === parseInt(year));
      drawChart(canvas, yBets);
      canvas.dataset.drawn = '1';
    }
  }
}

/* ─── Suppression ───────────────────────────────────────────────────── */
let pendingDeleteId = null;

function openDeleteModal(id) {
  const bet = bets.find(b => b.id === id);
  if (!bet) return;
  pendingDeleteId = id;
  const bilan = r2(bet.gain - bet.mise);
  const sign = bilan >= 0 ? '+' : '−';
  const bilanAbs = Math.abs(bilan).toLocaleString('fr-FR', { minimumFractionDigits:2, maximumFractionDigits:2 });
  document.getElementById('del-info').innerHTML =
    `Mise : <strong>${fmtEurPlain(bet.mise)}</strong>&nbsp;·&nbsp;Bilan : <strong style="color:${bilan>=0?'var(--win)':'var(--loss)'}">${sign}${bilanAbs} €</strong><br><span style="font-size:11px;color:var(--text3)">${fmtDate(bet.date)}</span>`;
  document.getElementById('del-overlay').classList.add('show');
}

function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('del-overlay').classList.remove('show');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('del-overlay')) closeDeleteModal();
}

function doDelete() {
  if (!pendingDeleteId) return;
  try {
    const raw = localStorage.getItem(RECORD_PHOTO_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj.betId === pendingDeleteId) localStorage.removeItem(RECORD_PHOTO_KEY);
    }
  } catch(e) {}
  bets = bets.filter(b => b.id !== pendingDeleteId);
  saveBets(bets);
  closeDeleteModal();
  renderDashboard();
  renderHistory();
  showToast('Pari supprimé', 'loss');
}

/* ─── Édition ───────────────────────────────────────────────────────── */
let pendingEditId = null;
let editSelectedResult = null;

function toDatetimeLocal(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function openEditModal(id) {
  const bet = bets.find(b => b.id === id);
  if (!bet) return;
  pendingEditId = id;
  const isWin = bet.gain > bet.mise;
  editSelectedResult = isWin ? 'win' : 'loss';

  document.getElementById('edit-mise').value = bet.mise;
  document.getElementById('edit-gain').value = bet.gain;
  document.getElementById('edit-date').value = toDatetimeLocal(bet.date);
  document.getElementById('edit-btn-win').className  = 'result-btn' + (isWin  ? ' selected-win'  : '');
  document.getElementById('edit-btn-loss').className = 'result-btn' + (!isWin ? ' selected-loss' : '');
  document.getElementById('edit-gain-row').style.display = isWin ? '' : 'none';

  document.getElementById('edit-overlay').classList.add('show');
}

function editSelectResult(type) {
  editSelectedResult = type;
  document.getElementById('edit-btn-win').className  = 'result-btn' + (type==='win'  ? ' selected-win'  : '');
  document.getElementById('edit-btn-loss').className = 'result-btn' + (type==='loss' ? ' selected-loss' : '');
  document.getElementById('edit-gain-row').style.display = type === 'win' ? '' : 'none';
  if (type === 'loss') document.getElementById('edit-gain').value = '';
}

function closeEditModal() {
  pendingEditId = null;
  document.getElementById('edit-overlay').classList.remove('show');
}

function handleEditOverlayClick(e) {
  if (e.target === document.getElementById('edit-overlay')) closeEditModal();
}

function doEdit() {
  if (!pendingEditId) return;
  const bet = bets.find(b => b.id === pendingEditId);
  if (!bet) return;

  const mise = parseFloat(document.getElementById('edit-mise').value);
  if (!(mise > 0)) { showToast('Mise invalide', 'loss'); return; }
  const gain = editSelectedResult === 'loss' ? 0 : (parseFloat(document.getElementById('edit-gain').value) || 0);
  const dateVal = document.getElementById('edit-date').value;
  const newDate = dateVal ? new Date(dateVal) : new Date(bet.date);

  const wasRecord = getBiggestWin()?.id === bet.id;

  bet.mise = r2(mise);
  bet.gain = r2(gain);
  bet.date = newDate.toISOString();
  bet.year = newDate.getFullYear();

  saveBets(bets);
  closeEditModal();
  renderDashboard();
  renderHistory();
  showToast('Pari modifié', editSelectedResult === 'win' ? 'win' : 'loss');
}

/* ─── Init ──────────────────────────────────────────────────────────── */
renderDashboard();
inputGain.addEventListener('keydown', e => { if (e.key === 'Enter') addBet(); });
</script>
